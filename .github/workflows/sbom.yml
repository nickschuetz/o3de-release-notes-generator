name: Update SBOM

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'tests/**'
      - 'generate_sbom.py'
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlapping runs from racing on `git push`. Cancellation is disabled
# so an already-pushed SBOM update is not silently aborted.
concurrency:
  group: sbom-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-sbom:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (not floating tags) for supply-chain hardening.
      # Comment after each pin records the human-readable version. Keep both in
      # sync. See CONTRIBUTING.md for the manual update procedure.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Generate SBOM
        run: python generate_sbom.py

      - name: Commit SBOM if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sbom.cdx.json
          if git diff --cached --quiet; then
            echo "SBOM unchanged, skipping commit"
          else
            git commit -m "Update SBOM"
            git push
          fi
