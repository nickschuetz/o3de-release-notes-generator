name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Project requires Python 3.10+ (uses union syntax `dict | None`).
        python-version: ['3.10', '3.11', '3.12']
    steps:
      # Pinned to commit SHAs — see CONTRIBUTING.md for the update policy.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify --version smoke test
        run: python release_notes.py --version

      - name: Verify SBOM regenerator runs
        run: python generate_sbom.py
